<script>
    let isOpen = false;

    document.querySelector('a-scene').addEventListener('loaded', () => {
        const panel = document.getElementById('door-panel');
        const hint  = document.getElementById('hint');
        const rig   = document.getElementById('rig');

        setInterval(() => {
            const p = rig.getAttribute('position');
            const d = Math.sqrt(p.x*p.x + Math.pow(p.z - 7, 2));
            hint.style.opacity = d < 6 ? '1' : '0';
        }, 300);

        panel.addEventListener('click', () => {
            panel.emit(isOpen ? 'close' : 'open');
            isOpen = !isOpen;
            hint.textContent = isOpen ? '🚪 Click to close' : '🚪 Click the door to open / close';
        });
        panel.addEventListener('mouseenter', () => panel.setAttribute('color','#2e2e2e'));
        panel.addEventListener('mouseleave', () => panel.setAttribute('color','#1a1a1a'));
    });

    const views = ['0 1.7 18', '0 1.6 3', '-4.5 6.2 7.2'];
    function go(i) {
        document.getElementById('rig').setAttribute('position', views[i]);
        document.querySelectorAll('.btn').forEach((b,j) => b.classList.toggle('on', i===j));
    }
 
</script>
