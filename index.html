<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame Practicals</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; font-family:Georgia,serif; }
        #title { position:absolute; top:18px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.72); border:1px solid rgba(212,175,55,0.55); border-radius:4px; padding:9px 26px; color:#D4AF37; font-size:13px; letter-spacing:4px; text-transform:uppercase; backdrop-filter:blur(8px); text-align:center; }
        #title span { display:block; font-size:9px; color:#aaa; letter-spacing:3px; margin-top:3px; }
        #controls { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.12); border-radius:4px; padding:7px 18px; color:#bbb; font-size:11px; letter-spacing:2px; backdrop-filter:blur(5px); }
        #btns { position:absolute; top:18px; right:18px; display:flex; flex-direction:column; gap:8px; pointer-events:all; }
        .btn { background:rgba(10,10,20,0.82); border:1px solid rgba(212,175,55,0.45); color:#D4AF37; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:8px 15px; border-radius:3px; cursor:pointer; backdrop-filter:blur(4px); transition:all 0.2s; }
        .btn:hover,.btn.on { background:rgba(212,175,55,0.22); border-color:#D4AF37; color:#fff; }
    </style>
</head>
<body>

<a-scene shadow="type: pcfsoft" cursor="rayOrigin: mouse" background="color:#87CEEB">

    <a-assets>
        <img id="floor-texture" src="https://cdn.glitch.global/3f392931-e408-466d-979a-e24c233e75e4/wood_floor.jpg?v=1675851235">
    </a-assets>

    <!-- SKY & SUN — deep blue sky -->
    <a-sky color="#87CEEB" material="color:#87CEEB;shader:flat"></a-sky>
    <a-sphere position="20 25 -15" radius="3" color="#FFE033" material="emissive:#FFE033;emissiveIntensity:1.2"></a-sphere>

    <!-- CLOUDS -->
    <a-sphere position="-15 20 -30" radius="3.5" color="#ffffff" material="shader:flat;opacity:0.85;transparent:true"></a-sphere>
    <a-sphere position="-12 20 -30" radius="2.8" color="#ffffff" material="shader:flat;opacity:0.85;transparent:true"></a-sphere>
    <a-sphere position="-17 19 -30" radius="2.5" color="#ffffff" material="shader:flat;opacity:0.85;transparent:true"></a-sphere>
    <a-sphere position="10 22 -35"  radius="3.0" color="#ffffff" material="shader:flat;opacity:0.8;transparent:true"></a-sphere>
    <a-sphere position="13 22 -35"  radius="2.5" color="#ffffff" material="shader:flat;opacity:0.8;transparent:true"></a-sphere>
    <a-sphere position="8 21 -35"   radius="2.2" color="#ffffff" material="shader:flat;opacity:0.8;transparent:true"></a-sphere>

    <!-- BIRDS — each bird is two angled wings (V shape), animated flying across sky -->
    <!-- Bird 1 -->
    <a-entity position="0 18 -20" animation="property:position;from:-20 18 -20;to:20 20 -20;dur:9000;loop:true;easing:linear">
        <a-box position="-0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 20"  color="#111" material="shader:flat"></a-box>
        <a-box position=" 0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 -20" color="#111" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 2 -->
    <a-entity position="0 19 -22" animation="property:position;from:-25 19 -22;to:22 21 -22;dur:11000;loop:true;easing:linear">
        <a-box position="-0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 20"  color="#111" material="shader:flat"></a-box>
        <a-box position=" 0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 -20" color="#111" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 3 -->
    <a-entity position="0 21 -18" animation="property:position;from:25 21 -18;to:-20 22 -18;dur:10000;loop:true;easing:linear">
        <a-box position="-0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 20"  color="#111" material="shader:flat"></a-box>
        <a-box position=" 0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 -20" color="#111" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 4 -->
    <a-entity position="0 17 -25" animation="property:position;from:-30 17 -25;to:28 19 -25;dur:13000;loop:true;easing:linear">
        <a-box position="-0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 20"  color="#111" material="shader:flat"></a-box>
        <a-box position=" 0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 -20" color="#111" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 5 -->
    <a-entity position="0 20 -15" animation="property:position;from:18 20 -15;to:-22 18 -15;dur:8000;loop:true;easing:linear">
        <a-box position="-0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 20"  color="#111" material="shader:flat"></a-box>
        <a-box position=" 0.3 0 0" width="0.7" height="0.06" depth="0.15" rotation="0 0 -20" color="#111" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 6 — smaller, higher up -->
    <a-entity position="0 24 -28" animation="property:position;from:-18 24 -28;to:25 25 -28;dur:14000;loop:true;easing:linear">
        <a-box position="-0.2 0 0" width="0.5" height="0.05" depth="0.12" rotation="0 0 18"  color="#222" material="shader:flat"></a-box>
        <a-box position=" 0.2 0 0" width="0.5" height="0.05" depth="0.12" rotation="0 0 -18" color="#222" material="shader:flat"></a-box>
    </a-entity>
    <!-- Bird 7 — smaller -->
    <a-entity position="0 23 -26" animation="property:position;from:20 23 -26;to:-25 24 -26;dur:12000;loop:true;easing:linear">
        <a-box position="-0.2 0 0" width="0.5" height="0.05" depth="0.12" rotation="0 0 18"  color="#222" material="shader:flat"></a-box>
        <a-box position=" 0.2 0 0" width="0.5" height="0.05" depth="0.12" rotation="0 0 -18" color="#222" material="shader:flat"></a-box>
    </a-entity>

    <!-- SINGLE SOLID GROUND — one box, no z-fighting -->
    <a-box position="0 -0.05 0" width="80" height="0.1" depth="80" color="#7aad5f" roughness="0.95" shadow="receive:true"></a-box>

    <!-- Driveway slabs -->
    <a-box position="0 0.06 17" width="7"  height="0.06" depth="12" color="#b0b0b0"></a-box>
    <a-box position="0 0.06 24" width="12" height="0.06" depth="2"  color="#c8c8c8"></a-box>

    <!-- Landscaping -->
    <a-sphere position="-6 0.35 10"   radius="0.45" color="#2d7a2d"></a-sphere>
    <a-sphere position="-7.5 0.35 10" radius="0.4"  color="#368236"></a-sphere>
    <a-sphere position="-9 0.35 10"   radius="0.45" color="#2d7a2d"></a-sphere>
    <a-sphere position="6 0.35 10"    radius="0.45" color="#2d7a2d"></a-sphere>
    <a-sphere position="7.5 0.35 10"  radius="0.4"  color="#368236"></a-sphere>
    <a-sphere position="9 0.35 10"    radius="0.45" color="#2d7a2d"></a-sphere>
    <a-sphere position="8.5 0.3 13"   radius="0.4"  color="#e84e8a" material="emissive:#5a0020;emissiveIntensity:0.05"></a-sphere>
    <a-sphere position="9.5 0.3 12"   radius="0.35" color="#e04080"></a-sphere>
    <a-cylinder position="-11 2.5 6"  radius="0.12" height="5" color="#7a5c3a"></a-cylinder>
    <a-sphere   position="-11 5.2 6"  radius="1.4"  color="#1a7a1a" scale="1 0.5 1"></a-sphere>
    <a-cylinder position="12 2.5 4"   radius="0.12" height="5" color="#7a5c3a"></a-cylinder>
    <a-sphere   position="12 5.2 4"   radius="1.4"  color="#1a7a1a" scale="1 0.5 1"></a-sphere>

    <!-- ═══════════════════════════════════════
         HOUSE EXTERIOR — GF
         The old solid box (width=12,depth=12) is replaced with
         3 individual walls: BACK + LEFT + RIGHT.
         FRONT FACE (z=+6) is completely open — no wall, no door.
    ════════════════════════════════════════ -->

    <!-- GF BACK wall -->
    <a-box position="0 2.5 -6"  width="12"  height="5" depth="0.3" color="#eaeaea" roughness="0.75" shadow="cast:true;receive:true"></a-box>
    <!-- GF LEFT wall -->
    <a-box position="-6 2.5 0"  width="0.3" height="5" depth="12"  color="#eaeaea" roughness="0.75" shadow="cast:true;receive:true"></a-box>
    <!-- GF RIGHT wall -->
    <a-box position="6 2.5 0"   width="0.3" height="5" depth="12"  color="#eaeaea" roughness="0.75" shadow="cast:true;receive:true"></a-box>
    <!-- GF FLOOR slab (exterior ground floor) -->
    <a-box position="0 0.06 0"  width="12"  height="0.1" depth="12" color="#d0cfc8" roughness="0.8" shadow="receive:true"></a-box>
    <!-- GF CEILING slab -->
    <a-box position="0 5.0 0"   width="12"  height="0.2" depth="12" color="#ddd"></a-box>

    <!-- GF dark left cladding (exterior finish on left side) -->
    <a-box position="-7.1 2.5 0" width="2.2" height="5" depth="12.4" color="#3a3a3a"></a-box>
    <!-- GF dark right cladding -->
    <a-box position="7.1 2.5 0"  width="2.2" height="5" depth="12.4" color="#3a3a3a"></a-box>
    <!-- GF top band -->
    <a-box position="0 5.1 0" width="16.5" height="0.25" depth="12.6" color="#2e2e2e"></a-box>

    <!-- GF right window -->
    <a-box position="4.5 2 6.22" width="2.2"  height="2.2"  depth="0.05" color="#1a1a20" material="opacity:0.85;transparent:true;emissive:#3a3a50;emissiveIntensity:0.25"></a-box>
    <a-box position="4.5 2 6.27" width="2.35" height="2.35" depth="0.07" color="#111"></a-box>
    <a-box position="4.5 2 6.30" width="0.04" height="2.2"  depth="0.03" color="#222"></a-box>
    <a-box position="4.5 2 6.30" width="2.2"  height="0.04" depth="0.03" color="#222"></a-box>

    <!-- ═══ FF (First Floor) ═══ -->
    <a-box position="2 7.5 0" width="10" height="5" depth="12" color="#eaeaea" roughness="0.75" shadow="cast:true;receive:true"></a-box>
    <a-box position="7.1 7.5 0"  width="2.2" height="5.2" depth="12.4" color="#3a3a3a"></a-box>
    <a-box position="-4.5 9.5 0" width="3"   height="1.5" depth="12.4" color="#2e2e2e"></a-box>
    <a-box position="-4.5 7.5 0" width="3"   height="5"   depth="12.4" color="#2e2e2e"></a-box>
    <!-- Pergola louvres -->
    <a-box position="-4.5 10.35  1.5" width="3.2" height="0.12" depth="8"    color="#222"></a-box>
    <a-box position="-4.5 10.25 -1.8" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25 -1.2" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25 -0.6" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  0.0" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  0.6" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  1.2" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  1.8" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  2.4" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  3.0" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <a-box position="-4.5 10.25  3.6" width="3"   height="0.08" depth="0.18" color="#333"></a-box>
    <!-- Balcony -->
    <a-box position="-4.5 5.2  6.8" width="3.2" height="0.22" depth="2.2" color="#eaeaea" shadow="cast:true"></a-box>
    <a-box position="-4.5 5.34 6.8" width="3.0" height="0.06" depth="2.0" color="#555"></a-box>
    <a-box position="-4.5 6.0  7.8" width="3.2" height="0.08" depth="0.06" color="#1a1a1a"></a-box>
    <a-box position="-4.5 5.46 7.8" width="3.2" height="0.06" depth="0.06" color="#1a1a1a"></a-box>
    <a-box position="-5.8 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-5.4 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-5.0 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-4.6 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-4.2 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-3.8 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-3.4 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="-3.0 5.73 7.8" width="0.04" height="0.55" depth="0.04" color="#1a1a1a"></a-box>
    <!-- FF windows -->
    <a-box position="3.5 7.5 6.22" width="3.8"  height="3.5"  depth="0.05" color="#1a1a22" material="opacity:0.8;transparent:true;emissive:#252535;emissiveIntensity:0.3"></a-box>
    <a-box position="3.5 7.5 6.27" width="4.0"  height="3.65" depth="0.08" color="#111"></a-box>
    <a-box position="3.5 7.5 6.30" width="0.05" height="3.5"  depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="3.5 7.5 6.30" width="3.8"  height="0.05" depth="0.04" color="#1a1a1a"></a-box>
    <a-box position="6.5 7.8 6.22" width="1.4"  height="2.2"  depth="0.05" color="#1a1a22" material="opacity:0.8;transparent:true;emissive:#252535;emissiveIntensity:0.2"></a-box>
    <a-box position="6.5 7.8 6.27" width="1.55" height="2.35" depth="0.08" color="#111"></a-box>
    <a-box position="-4.5 6.0 6.22" width="1.4"  height="1.5"  depth="0.05" color="#1a1a1a"></a-box>
    <a-box position="-4.5 6.0 6.27" width="1.55" height="1.65" depth="0.08" color="#111"></a-box>
    <!-- Roof -->
    <a-box position="2 10.3  0"    width="10.4" height="0.3" depth="12.4" color="#3a3a3a"></a-box>
    <a-box position="-4.5 10.5 0"  width="3.4"  height="0.3" depth="12.4" color="#2e2e2e"></a-box>
    <a-box position="2 10.75  6.3" width="10.4" height="0.8" depth="0.2"  color="#3a3a3a"></a-box>
    <a-box position="2 10.75 -6.3" width="10.4" height="0.8" depth="0.2"  color="#3a3a3a"></a-box>
    <a-box position="8.3 10.75 0"  width="0.2"  height="0.8" depth="12.4" color="#3a3a3a"></a-box>

    <!-- Lighting -->
    <a-entity light="type:directional;color:#fff5e0;intensity:0.85;castShadow:true" position="-8 16 12"></a-entity>
    <a-entity light="type:directional;color:#ddeeff;intensity:0.25" position="10 8 -5"></a-entity>

    <!-- ═══════════════════════════════════════
         INTERIOR ROOM
    ════════════════════════════════════════ -->

    <!-- INTERIOR FLOOR: solid black box, sits clearly above ground -->
    <a-box position="0 0.12 0" width="10" height="0.12" depth="10" color="#111111" roughness="0.5" shadow="receive:true"></a-box>

    <!-- INTERIOR CEILING -->
    <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10" color="#ffffff"></a-plane>

    <!-- INTERIOR WALLS: back + right only. Front (z=+5) OPEN. Left (x=-5) OPEN. -->
    <a-box position="0 2 -5" width="10"  height="4" depth="0.2" color="#f5f5f5" shadow="receive:true"></a-box>
    <a-box position="5 2  0" width="0.2" height="4" depth="10"  color="#e8e8e8" shadow="receive:true"></a-box>

    <!-- SKIRTING -->
    <a-box position="0 0.18 -4.9"  width="10"  height="0.1" depth="0.08" color="#333"></a-box>
    <a-box position="4.9 0.18 0" rotation="0 90 0" width="10" height="0.1" depth="0.08" color="#333"></a-box>

    <!-- WINDOW & CURTAINS -->
    <a-entity position="-3 2 -4.85">
        <a-plane width="3" height="2.5" color="#fff" material="emissive:#fff;emissiveIntensity:0.2"></a-plane>
        <a-box width="3.2" height="0.1" depth="0.1" position="0  1.3 0" color="#222"></a-box>
        <a-box width="3.2" height="0.1" depth="0.1" position="0 -1.3 0" color="#222"></a-box>
        <a-box width="0.8" height="3"   depth="0.15" position="-1.2 0 0.1" color="#fffaf0"></a-box>
        <a-box width="0.8" height="3"   depth="0.15" position=" 1.2 0 0.1" color="#fffaf0"></a-box>
    </a-entity>

    <!-- FLOOR VASE -->
    <a-entity position="-4.2 0.12 -4.2">
        <a-cylinder radius="0.2" height="0.7" color="#222" material="metalness:0.5;roughness:0.2"></a-cylinder>
        <a-entity position="0 0.4 0">
            <a-cylinder radius="0.01" height="1.2" color="green" rotation="10 0 10"></a-cylinder>
            <a-sphere radius="0.1" color="#ff0077" position="0.15 0.6 0.1" material="emissive:#ff0077;emissiveIntensity:0.2"></a-sphere>
            <a-cylinder radius="0.01" height="1.2" color="green" rotation="-15 20 5"></a-cylinder>
            <a-sphere radius="0.1" color="#ffffff" position="-0.2 0.6 -0.1"></a-sphere>
            <a-cylinder radius="0.01" height="1.2" color="green" rotation="5 45 -10"></a-cylinder>
            <a-sphere radius="0.1" color="#ffaa00" position="0.1 0.7 -0.2"></a-sphere>
        </a-entity>
    </a-entity>

    <!-- WALL CLOCK — pulled to z=-4.55, shader:flat removes shadow and z-fighting -->
    <a-entity position="0 2.8 -4.55">
        <a-circle radius="0.43" position="0 0 0"    color="#222" material="shader:flat"></a-circle>
        <a-circle radius="0.40" position="0 0 0.02" color="#fff" material="shader:flat"></a-circle>
        <a-box width="0.025" height="0.22" position="0 0.11 0.04" color="#111" material="shader:flat"></a-box>
        <a-box width="0.018" height="0.16" position="0.08 0 0.04" rotation="0 0 -90" color="#111" material="shader:flat"></a-box>
        <a-sphere radius="0.025" position="0 0 0.05" color="#cc0000" material="shader:flat;emissive:#cc0000;emissiveIntensity:0.3"></a-sphere>
    </a-entity>

    <!-- BLUE LED TRAILS -->
    <a-box position="-2.5 3.98 0" width="0.05" height="0.02" depth="9" color="#0077ff" material="emissive:#0077ff;emissiveIntensity:2"></a-box>
    <a-box position=" 2.5 3.98 0" width="0.05" height="0.02" depth="9" color="#0077ff" material="emissive:#0077ff;emissiveIntensity:2"></a-box>

    <!-- RECESSED SPOTLIGHTS -->
    <a-cylinder position="-3 3.95 -3" radius="0.15" height="0.05" color="#fff" material="emissive:#fff"></a-cylinder>
    <a-cylinder position=" 3 3.95 -3" radius="0.15" height="0.05" color="#fff" material="emissive:#fff"></a-cylinder>
    <a-cylinder position="-3 3.95  3" radius="0.15" height="0.05" color="#fff" material="emissive:#fff"></a-cylinder>
    <a-cylinder position=" 3 3.95  3" radius="0.15" height="0.05" color="#fff" material="emissive:#fff"></a-cylinder>

    <!-- SPUTNIK CHANDELIER -->
    <a-entity position="0 3.95 0">
        <a-cylinder radius="0.015" height="0.8" position="0 -0.4 0" color="#D4AF37"></a-cylinder>
        <a-sphere radius="0.1" position="0 -0.8 0" color="#D4AF37"></a-sphere>
        <a-entity position="0 -0.8 0">
            <a-entity rotation="0 0 0">
                <a-cylinder radius="0.01" height="1" rotation="0 0 90" color="#D4AF37"></a-cylinder>
                <a-sphere radius="0.07" position=" 0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
                <a-sphere radius="0.07" position="-0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
            </a-entity>
            <a-entity rotation="0 90 0">
                <a-cylinder radius="0.01" height="1" rotation="0 0 90" color="#D4AF37"></a-cylinder>
                <a-sphere radius="0.07" position=" 0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
                <a-sphere radius="0.07" position="-0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
            </a-entity>
            <a-entity rotation="45 45 0">
                <a-cylinder radius="0.01" height="1" rotation="0 0 90" color="#D4AF37"></a-cylinder>
                <a-sphere radius="0.07" position=" 0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
                <a-sphere radius="0.07" position="-0.5 0 0" color="#fff" material="emissive:#fff;emissiveIntensity:2"></a-sphere>
            </a-entity>
            <a-entity rotation="-45 45 0">
                <a-cylinder radius="0.01" height="1" rotation="0 0 90" color="#D4AF37"></a-cylinder>
